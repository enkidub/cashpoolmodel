<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimulationDashboard Preview — CashPoolModel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          serif: ['Cormorant Garamond', 'Georgia', 'serif'],
          sans:  ['DM Sans', 'system-ui', 'sans-serif'],
          mono:  ['DM Mono', 'monospace'],
        }
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f8fafc; }
  :root { --indigo: #4f46e5; --indigo-h: #4338ca; --slate-bar: #e2e8f0; }
  .bar-group:hover .tooltip { display: block; }
  .tooltip { display: none; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  @media print {
    body { background: white; }
    aside { display: none !important; }
    nav { display: none !important; }
    button { display: none !important; }
    [data-print-hide] { display: none !important; }
    #root > div { min-height: auto; }
    .bg-white { break-inside: avoid; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const { useState } = React;

// ─── SVG Icons ────────────────────────────────────────────────────────────

const PATHS = {
  layout:   <><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>,
  share2:   <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>,
  trending: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
  grid:     <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
  download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
  chevron:  <polyline points="9 18 15 12 9 6"/>,
  clock:    <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
  check:    <polyline points="20 6 9 17 4 12"/>,
  file:     <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
  star:     <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
  robot:    <><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M12 11V7"/><circle cx="12" cy="5" r="2"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/><line x1="9" y1="19" x2="9" y2="21"/><line x1="15" y1="19" x2="15" y2="21"/></>,
};

const Ico = ({ name, size = 15, color = 'currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    {PATHS[name]}
  </svg>
);

// ─── Ring ─────────────────────────────────────────────────────────────────

const Ring = ({ value, size = 46 }) => {
  const r = (size - 5.6) / 2;
  const cir = 2 * Math.PI * r;
  const arc = (value / 100) * cir;
  const c = size / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="#f1f5f9" strokeWidth="2.8"/>
      <circle cx={c} cy={c} r={r} fill="none" stroke="var(--indigo)" strokeWidth="2.8"
        strokeDasharray={`${arc} ${cir}`} strokeLinecap="round"
        style={{ transform: 'rotate(-90deg)', transformOrigin: '50% 50%' }}/>
    </svg>
  );
};

// ─── Data ─────────────────────────────────────────────────────────────────

const NAV = [
  { id:'summary',     label:'Executive Summary',  icon:'layout'   },
  { id:'structure',   label:'Pool Structure',      icon:'share2'   },
  { id:'pnl',         label:'P&L & Savings',       icon:'trending' },
  { id:'sensitivity', label:'Sensitivity Matrix',  icon:'grid'     },
  { id:'export',      label:'Export / RFP Data',   icon:'download' },
  { id:'analysis',    label:'AI Scenarios',        icon:'robot'    },
];

const KPIS = [
  { label:'Net Interest Savings', value:'€842k',  badge:'↑ 18.3%', sub:'vs. standalone arrangement',  ring:null },
  { label:'Netting Efficiency',   value:'73%',    badge:'↑ 12pp',  sub:'above sector benchmark',       ring:73   },
  { label:'Operational Savings',  value:'€230k',  badge:'Additional',sub:'FX, facility fees, accounts', ring:null },
  { label:'Avg. Yield Spread',    value:'+1.2%',  badge:'+120 bp', sub:'over pool benchmark rate',     ring:null },
];

const CHART = [
  { period:'Q1 2025', without:285, pooled:142 },
  { period:'Q2 2025', without:312, pooled:156 },
  { period:'Q3 2025', without:298, pooled:149 },
  { period:'Q4 2025', without:327, pooled:163 },
];
const CH = 200, CMAX = 380;

const SUBS = [
  { name:'Acme Germany GmbH',    cc:'EUR', balance:'€4.2M',    savings:'€218k', pct:25.9 },
  { name:'Acme France SAS',      cc:'EUR', balance:'€3.8M',    savings:'€196k', pct:23.3 },
  { name:'Acme UK Ltd',          cc:'GBP', balance:'£2.1M',    savings:'€142k', pct:16.9 },
  { name:'Acme Netherlands BV',  cc:'EUR', balance:'€1.9M',    savings:'€128k', pct:15.2 },
  { name:'Acme Switzerland AG',  cc:'CHF', balance:'CHF 1.4M', savings:'€98k',  pct:11.6 },
  { name:'Acme Austria GmbH',    cc:'EUR', balance:'€0.8M',    savings:'€60k',  pct:7.1  },
];

// ─── KPI Card ──────────────────────────────────────────────────────────────

function KPICard({ label, value, badge, sub, ring }) {
  return (
    <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm flex flex-col gap-2">
      <div className="flex items-center justify-between">
        <span className="text-slate-400 font-semibold"
          style={{ fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'DM Sans, sans-serif' }}>
          {label}
        </span>
        <span className="text-emerald-600 bg-emerald-50 rounded-full font-semibold px-1.5 py-0.5 tabular-nums"
          style={{ fontSize:10 }}>
          {badge}
        </span>
      </div>

      <div className="flex items-end justify-between">
        <span className="text-slate-900 leading-none tabular-nums"
          style={{ fontFamily:'Cormorant Garamond, Georgia, serif', fontSize:38, fontWeight:600, letterSpacing:'-0.5px' }}>
          {value}
        </span>
        {ring !== null && (
          <div style={{ position:'relative', width:46, height:46 }}>
            <Ring value={ring} />
            <span className="font-bold text-slate-700 tabular-nums"
              style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', fontSize:9, fontFamily:'DM Mono, monospace' }}>
              {ring}%
            </span>
          </div>
        )}
      </div>

      <p className="text-slate-400" style={{ fontSize:11, fontFamily:'DM Sans, sans-serif', fontWeight:300 }}>{sub}</p>
    </div>
  );
}

// ─── Bar Chart ─────────────────────────────────────────────────────────────

function BarChart() {
  const [hov, setHov] = useState(null);
  const ph = v => `${(v / CMAX) * CH}px`;

  return (
    <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">

      {/* Header */}
      <div className="flex items-start justify-between mb-6">
        <div>
          <div className="font-semibold text-slate-800" style={{ fontSize:14 }}>
            Interest Cost: Before vs. After Pooling
          </div>
          <div className="text-slate-400 mt-0.5" style={{ fontSize:11 }}>
            Quarterly interest expense · EUR thousands · illustrative simulation output
          </div>
        </div>
        <div style={{ display:'flex', gap:20, alignItems:'center' }}>
          {[
            { bg:'#e2e8f0', border:'#cbd5e1', label:'Without pooling' },
            { bg:'#4f46e5', border:'#4f46e5', label:'With CashPoolModel' },
          ].map(({ bg, border, label }) => (
            <div key={label} style={{ display:'flex', alignItems:'center', gap:6 }}>
              <div style={{ width:12, height:12, borderRadius:3, background:bg, border:`1.5px solid ${border}` }} />
              <span className="text-slate-500" style={{ fontSize:11 }}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Chart area */}
      <div style={{ display:'flex', alignItems:'flex-start', gap:0 }}>

        {/* Y axis */}
        <div style={{ position:'relative', width:40, height:CH, flexShrink:0 }}>
          {[0,100,200,300].map(v => (
            <span key={v} className="text-slate-400"
              style={{
                position:'absolute', right:8,
                bottom:`calc(${(v/CMAX)*CH}px - 6px)`,
                fontSize:9, fontFamily:'DM Mono, monospace', lineHeight:1
              }}>
              {v}k
            </span>
          ))}
        </div>

        {/* Bars + grid */}
        <div style={{ flex:1, position:'relative', height:CH, borderLeft:'1px solid #e2e8f0', borderBottom:'1px solid #e2e8f0' }}>

          {/* Grid lines */}
          {[100,200,300].map(v => (
            <div key={v} style={{
              position:'absolute', left:0, right:0,
              bottom:`${(v/CMAX)*CH}px`,
              borderTop:'1px dashed #f1f5f9', pointerEvents:'none'
            }} />
          ))}

          {/* Bar groups */}
          <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'flex-end', justifyContent:'space-around', padding:'0 32px' }}>
            {CHART.map((d, gi) => (
              <div key={gi} style={{ display:'flex', alignItems:'flex-end', gap:6 }}>

                {/* Without bar */}
                <div
                  onMouseEnter={() => setHov({gi, which:'without'})}
                  onMouseLeave={() => setHov(null)}
                  style={{ position:'relative', cursor:'default' }}>
                  <div style={{
                    width:36, borderRadius:'3px 3px 0 0',
                    height: ph(d.without),
                    background:'#e2e8f0',
                    opacity: hov && (hov.gi!==gi || hov.which!=='without') ? 0.5 : 1,
                    transition:'opacity 0.1s'
                  }} />
                  {hov?.gi===gi && hov?.which==='without' && (
                    <div style={{
                      position:'absolute', bottom:`calc(${ph(d.without)} + 6px)`,
                      left:'50%', transform:'translateX(-50%)',
                      background:'#1e293b', color:'#fff',
                      fontSize:10, fontFamily:'DM Mono, monospace',
                      padding:'3px 7px', borderRadius:4,
                      whiteSpace:'nowrap', zIndex:10,
                      boxShadow:'0 2px 8px rgba(0,0,0,.18)'
                    }}>
                      €{d.without}k
                    </div>
                  )}
                </div>

                {/* Pooled bar */}
                <div
                  onMouseEnter={() => setHov({gi, which:'pooled'})}
                  onMouseLeave={() => setHov(null)}
                  style={{ position:'relative', cursor:'default' }}>
                  <div style={{
                    width:36, borderRadius:'3px 3px 0 0',
                    height: ph(d.pooled),
                    background:'#4f46e5',
                    opacity: hov && (hov.gi!==gi || hov.which!=='pooled') ? 0.5 : 1,
                    transition:'opacity 0.1s'
                  }} />
                  {hov?.gi===gi && hov?.which==='pooled' && (
                    <div style={{
                      position:'absolute', bottom:`calc(${ph(d.pooled)} + 6px)`,
                      left:'50%', transform:'translateX(-50%)',
                      background:'#4338ca', color:'#fff',
                      fontSize:10, fontFamily:'DM Mono, monospace',
                      padding:'3px 7px', borderRadius:4,
                      whiteSpace:'nowrap', zIndex:10,
                      boxShadow:'0 2px 8px rgba(0,0,0,.18)'
                    }}>
                      €{d.pooled}k · save €{d.without - d.pooled}k
                    </div>
                  )}
                </div>

              </div>
            ))}
          </div>
        </div>
      </div>

      {/* X-axis */}
      <div style={{ display:'flex', justifyContent:'space-around', paddingLeft:40, marginTop:8 }}>
        {CHART.map((d, i) => (
          <span key={i} className="text-slate-400 font-medium" style={{ fontSize:10 }}>{d.period}</span>
        ))}
      </div>

      {/* Summary strip */}
      <div style={{ marginTop:20, paddingTop:16, borderTop:'1px solid #f1f5f9', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16 }}>
        {[
          { label:'Total cost without pooling',    value:'€1,222k', color:'#475569' },
          { label:'Total cost with CashPoolModel', value:'€610k',   color:'#4f46e5' },
          { label:'Total annual interest saved',   value:'€612k · ↓ 50%', color:'#059669' },
        ].map(({ label, value, color }) => (
          <div key={label}>
            <div className="text-slate-400" style={{ fontSize:10, marginBottom:3 }}>{label}</div>
            <div style={{ fontFamily:'Cormorant Garamond, Georgia, serif', fontSize:17, fontWeight:600, color, tabularNums:true }}>
              {value}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Table ────────────────────────────────────────────────────────────────

function SubsidiaryTable({ entities: ents }) {
  const subs = ents ? ents.map(e => ({
    name: e.name,
    cc: e.cc,
    balance: e.balance,
    savings: e.annual || '—',
    pct: 0,
  })) : SUBS;
  const maxPct = Math.max(...subs.map((s,i) => i===0?25.9:s.pct||25.9/(i+1)));
  return (
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div style={{ padding:'16px 24px', borderBottom:'1px solid #f1f5f9', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div className="font-semibold text-slate-800" style={{ fontSize:13 }}>Top Contributing Subsidiaries</div>
          <div className="text-slate-400" style={{ fontSize:11, marginTop:2 }}>Ranked by projected annual savings · {subs.length} entities shown</div>
        </div>
        <button className="text-indigo-600 font-medium" style={{ fontSize:11, display:'flex', alignItems:'center', gap:4, background:'none', border:'none', cursor:'pointer' }}>
          View all <Ico name="chevron" size={11} color="#4f46e5"/>
        </button>
      </div>

      {/* Column headers */}
      <div style={{ display:'grid', gridTemplateColumns:'2fr 80px 1fr 1fr 160px', padding:'10px 24px', background:'#f8fafc', borderBottom:'1px solid #f1f5f9' }}>
        {['Subsidiary','Ccy','Avg Balance','Proj. Savings','Contribution'].map(h => (
          <span key={h} className="text-slate-400 font-semibold uppercase"
            style={{ fontSize:10, letterSpacing:'0.07em' }}>{h}</span>
        ))}
      </div>

      {subs.map((s, i) => (
        <div key={i}
          style={{ display:'grid', gridTemplateColumns:'2fr 80px 1fr 1fr 160px', padding:'13px 24px',
            borderBottom: i < subs.length-1 ? '1px solid #f8fafc' : 'none',
            alignItems:'center', transition:'background 0.1s' }}
          onMouseEnter={e => e.currentTarget.style.background='#f8fafc'}
          onMouseLeave={e => e.currentTarget.style.background='transparent'}>

          {/* Name */}
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:20, height:20, borderRadius:4, background:'#f1f5f9', border:'1px solid #e2e8f0',
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <span style={{ fontSize:7, fontWeight:700, color:'#64748b', textTransform:'uppercase' }}>{s.cc}</span>
            </div>
            <span className="text-slate-700 font-medium" style={{ fontSize:12 }}>{s.name}</span>
          </div>

          {/* Currency */}
          <span style={{ fontSize:10, fontFamily:'DM Mono, monospace', fontWeight:600,
            color:'#475569', background:'#f1f5f9', borderRadius:4, padding:'2px 6px', width:'fit-content' }}>
            {s.cc}
          </span>

          {/* Balance */}
          <span className="text-slate-500 tabular-nums" style={{ fontSize:12, fontFamily:'DM Mono, monospace' }}>
            {s.balance}
          </span>

          {/* Savings */}
          <span className="text-emerald-600 font-semibold tabular-nums"
            style={{ fontFamily:'Cormorant Garamond, Georgia, serif', fontSize:16, fontWeight:600 }}>
            {s.savings}
          </span>

          {/* Bar + pct */}
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ flex:1, height:6, background:'#f1f5f9', borderRadius:99, overflow:'hidden' }}>
              <div style={{
                height:'100%', borderRadius:99,
                width:`${(s.pct/maxPct)*100}%`,
                background:'#4f46e5',
                opacity: 0.55 + (s.pct/maxPct)*0.45,
                transition:'width 0.6s ease'
              }} />
            </div>
            <span style={{ fontSize:10, fontFamily:'DM Mono, monospace', color:'#64748b', width:28, textAlign:'right' }}>
              {s.pct}%
            </span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────

function Sidebar({ active, onNav, groupName, totalEnt, ctaVisible }) {
  return (
    <aside style={{ width:240, background:'#fff', borderRight:'1px solid #e2e8f0',
      display:'flex', flexDirection:'column', flexShrink:0, position:'sticky', top:0, height:'100vh', overflowY:'auto' }}>

      {/* Logo */}
      <div style={{ padding:'18px 16px 14px', borderBottom:'1px solid #f1f5f9' }}>
        <div style={{ display:'flex', alignItems:'center', gap:9 }}>
          <div style={{ width:30, height:30, borderRadius:7, background:'#0f172a',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="8" width="3" height="7" rx="1" fill="#60a5fa"/>
              <rect x="6" y="4" width="3" height="11" rx="1" fill="#93c5fd"/>
              <rect x="11" y="1" width="3" height="14" rx="1" fill="#bfdbfe"/>
              <path d="M2 6.5l5.5-2.5 5.5-2.5" stroke="#4ade80" strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
          </div>
          <div>
            <div style={{ fontFamily:'Cormorant Garamond, Georgia, serif', fontSize:15, fontWeight:600, color:'#0f172a', lineHeight:1 }}>
              CashPoolModel
            </div>
            <div style={{ fontSize:9, color:'#94a3b8', marginTop:3, letterSpacing:'0.04em' }}>
              by Intercompany.io
            </div>
          </div>
        </div>
      </div>

      {/* Report meta */}
      <div style={{ margin:'10px 10px 4px', borderRadius:8, background:'#f8fafc', border:'1px solid #e2e8f0', padding:'9px 11px' }}>
        <div style={{ fontSize:9, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>
          Active Simulation
        </div>
        <div style={{ fontSize:12, fontWeight:600, color:'#1e293b', marginBottom:2 }}>{groupName}</div>
        <div style={{ fontSize:10, color:'#94a3b8' }}>{totalEnt} entities · Apr 2025</div>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, padding:'6px 10px', display:'flex', flexDirection:'column', gap:2 }}>
        <div style={{ fontSize:9, fontWeight:700, color:'#cbd5e1', textTransform:'uppercase',
          letterSpacing:'0.1em', padding:'8px 10px 4px' }}>
          Report sections
        </div>
        {NAV.map(item => {
          const isActive = item.id === active;
          return (
            <button key={item.id} onClick={() => onNav(item.id)}
              style={{
                width:'100%', display:'flex', alignItems:'center', gap:10,
                padding:'8px 10px', borderRadius:7, border:'none', cursor:'pointer', textAlign:'left',
                background: isActive ? '#f1f5f9' : 'transparent',
                color: isActive ? '#0f172a' : '#64748b',
                transition:'all 0.1s',
                fontFamily:'DM Sans, sans-serif',
              }}
              onMouseEnter={e => { if(!isActive) { e.currentTarget.style.background='#f8fafc'; e.currentTarget.style.color='#334155'; }}}
              onMouseLeave={e => { if(!isActive) { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#64748b'; }}}>
              <Ico name={item.icon} size={13} color={isActive ? '#0f172a' : '#94a3b8'} />
              <span style={{ fontSize:12, fontWeight: isActive ? 600 : 500, flex:1 }}>{item.label}</span>
              {isActive && <div style={{ width:6, height:6, borderRadius:'50%', background:'#0b1929' }} />}
            </button>
          );
        })}
      </nav>

      {/* CTA — navy card, fades in after 45s or 2nd tab */}
      <div style={{ padding:'0 10px 14px',
        opacity: ctaVisible ? 1 : 0,
        transform: ctaVisible ? 'translateY(0)' : 'translateY(8px)',
        transition: 'opacity .6s ease, transform .6s ease',
        pointerEvents: ctaVisible ? 'all' : 'none' }}>
        <div style={{ borderRadius:10, background:'#0b1929', padding:'14px 16px' }}>
          <div style={{ fontSize:10, fontWeight:700, color:'#9a6e10', letterSpacing:'.5px',
            textTransform:'uppercase', marginBottom:6 }}>Advisory Session</div>
          <p style={{ fontSize:11, color:'rgba(255,255,255,.55)', lineHeight:1.55, marginBottom:12, fontWeight:300 }}>
            Review this simulation with an independent treasury practitioner before your bank meeting.
          </p>
          <button style={{ width:'100%', fontSize:11, fontWeight:600, background:'#9a6e10', color:'#fff',
            borderRadius:6, padding:'8px', border:'none', cursor:'pointer', fontFamily:'DM Sans, sans-serif',
            transition:'background .14s' }}
            onClick={() => window.location.href='/contact.html'}
            onMouseEnter={e => e.currentTarget.style.background='#7d5808'}
            onMouseLeave={e => e.currentTarget.style.background='#9a6e10'}>
            Book Advisory Session →
          </button>
        </div>
      </div>
    </aside>
  );
}

// ─── Section titles data ──────────────────────────────────────────────────
const SECTION_TITLES = {

const AI_WORKER = 'https://cpm-ai.kuba-houser.workers.dev';

// ─── Analysis Section ─────────────────────────────────────────────────────
function Analysis({ sim, fmtK, netBenefit, interestSave, paybackMo, nettingEff, poolBank }) {
  const [aiInput, setAiInput]     = React.useState('');
  const [aiAnswer, setAiAnswer]   = React.useState(null);
  const [aiLoading, setAiLoading] = React.useState(false);
  const [listening, setListening] = React.useState(false);
  const [tab, setTab]             = React.useState('rate');

  const base = {
    interest:  Math.round((interestSave || 842000) / 1000),
    payback:   paybackMo || 8.4,
    netting:   nettingEff || 73,
    breakeven: 140,
  };

  const poolBankName = poolBank || 'ING Bank';
  const debitRate    = sim?.debitRate  || 0.055;
  const creditRate   = sim?.creditRate || 0.028;
  const poolDebit    = sim?.poolDebit  || 0.032;
  const poolCredit   = sim?.poolCredit || 0.040;
  const surplus      = sim?.surplus    || 6200000;
  const deficit      = sim?.deficit    || 2100000;
  const implCost     = sim?.implCost   || 150000;
  const annualCosts  = sim?.annualCosts|| 70000;

  const ccy     = sim?.currency || 'EUR';
  const rateRef = ccy==='USD'?'SOFR':ccy==='GBP'?'SONIA':ccy==='CHF'?'SARON':'€STR';
  const rateBase= ccy==='USD'?5.32:ccy==='GBP'?5.19:ccy==='CHF'?1.48:3.91;

  const [rateShift, setRateShift] = React.useState(0);
  const [balShift,  setBalShift]  = React.useState(0);
  const [entCount,  setEntCount]  = React.useState((sim?.entities||[]).length||6);

  const SUGGESTED = [
    `What if ${rateRef} drops by 100bp?`,
    `Which entity contributes most?`,
    `When do we break even?`,
    `ZBA vs notional — which suits us?`,
    `What if we add a new entity with €1M surplus?`,
  ];

  function computeWhatIf() {
    let interest = base.interest;
    if (tab==='rate') {
      interest = Math.round(base.interest + rateShift * surplus/1e5 * 0.8 + rateShift * deficit/1e5 * 0.6);
    } else if (tab==='balance') {
      interest = Math.round(base.interest * (1 + balShift/100));
    } else {
      interest = Math.round(base.interest * Math.min(entCount / Math.max((sim?.entities||[]).length||6,1) * 0.85+0.15, 1.4));
    }
    const netBen = interest - Math.round(annualCosts/1000);
    const pb = netBen>0 ? Math.round(implCost/1000/netBen*12*10)/10 : 999;
    const above = interest - base.breakeven;
    const verdict = interest > base.breakeven*4 ? 'GO' : interest > base.breakeven ? 'CONSIDER' : 'NO-GO';
    return { interest, pb, above, verdict };
  }
  const wi = computeWhatIf();

  async function runAnalysis(question) {
    if (!question.trim()) return;
    setAiLoading(true); setAiAnswer(null);
    const context = `Group: ${sim?.groupName||'Sample Group'} | Bank: ${poolBankName} | Currency: ${ccy} | Entities: ${(sim?.entities||[]).map(e=>e.name).join(', ')||'6 entities'} | Pool balance: ${fmtK?fmtK(sim?.poolBalance||12300000):'+€12.3M'} | Interest saving: ${fmtK?fmtK(interestSave||842000):'€842k'} | Netting efficiency: ${nettingEff||73}% | Payback: ${paybackMo||8.4} months | ${rateRef}: ${rateBase}% | Pool debit: ${(poolDebit*100).toFixed(2)}% | Pool credit: ${(poolCredit*100).toFixed(2)}% | Bilateral debit: ${(debitRate*100).toFixed(2)}% | Bilateral credit: ${(creditRate*100).toFixed(2)}% | Implementation cost: €${Math.round(implCost/1000)}k | Annual pool costs: €${Math.round(annualCosts/1000)}k`;
    try {
      const res = await fetch(AI_WORKER, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question, context }),
      });
      const data = await res.json();
      setAiAnswer(data.answer || 'No response received.');
    } catch(e) {
      setAiAnswer('AI analysis unavailable. Please check your connection or contact info@cashpoolmodel.com.');
    }
    setAiLoading(false);
  }

  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice input requires Chrome or Edge.'); return; }
    const r = new SR(); r.lang='en-US'; r.interimResults=false;
    r.onstart=()=>setListening(true); r.onend=()=>setListening(false); r.onerror=()=>setListening(false);
    r.onresult=(e)=>{ const t=e.results[0][0].transcript; setAiInput(t); runAnalysis(t); };
    r.start();
  }

  const whtExposure  = Math.round(deficit*0.015/1000);
  const notionalSave = Math.round(base.interest*0.92);
  const notionalNet  = notionalSave - whtExposure - Math.round(annualCosts/1000);
  const zbaNet       = base.interest - Math.round(annualCosts/1000);

  const cardStyle = { background:'#fff', border:'1px solid #e2e8f0', borderRadius:12, padding:'20px 24px', boxShadow:'0 1px 3px rgba(15,23,42,.06)' };
  const labelStyle = { fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'1px', marginBottom:8, display:'flex', alignItems:'center', gap:6 };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>

      {/* ── AI ASK ── */}
      <div style={cardStyle}>
        <div style={labelStyle}>
          <Ico name="robot" size={13} color="#94a3b8"/>
          AI Analysis
        </div>

        {/* Input row */}
        <div style={{ display:'flex', gap:8, marginBottom:12 }}>
          <input
            value={aiInput}
            onChange={e=>setAiInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&runAnalysis(aiInput)}
            placeholder={`Ask about your pool — e.g. "What if ${rateRef} drops by 100bp?"`}
            style={{ flex:1, padding:'9px 13px', borderRadius:7, border:'1.5px solid #e2e8f0',
              background:'#f8fafc', fontFamily:'DM Sans,sans-serif', fontSize:13, color:'#0f172a', outline:'none' }}
          />
          <button onClick={startVoice} title="Voice input"
            style={{ width:38, height:38, borderRadius:7, border:'1.5px solid #e2e8f0',
              background:listening?'#fee2e2':'#f8fafc', cursor:'pointer', display:'flex',
              alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke={listening?'#dc2626':'#64748b'} strokeWidth="1.8" strokeLinecap="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="9" y1="22" x2="15" y2="22"/>
            </svg>
          </button>
          <button onClick={()=>runAnalysis(aiInput)}
            style={{ padding:'9px 18px', borderRadius:7, background:'#0b1929', color:'#fff',
              fontFamily:'DM Sans,sans-serif', fontSize:13, fontWeight:600, border:'none', cursor:'pointer' }}>
            Analyze →
          </button>
        </div>

        {/* Suggested questions */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginBottom: (aiLoading||aiAnswer) ? 16 : 0 }}>
          {SUGGESTED.map((q,i)=>(
            <button key={i} onClick={()=>{setAiInput(q);runAnalysis(q);}}
              style={{ padding:'4px 11px', borderRadius:20, border:'1px solid #e2e8f0',
                background:'transparent', color:'#64748b', fontSize:11, fontWeight:500,
                cursor:'pointer', fontFamily:'DM Sans,sans-serif', transition:'all .13s' }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#0b1929';e.currentTarget.style.color='#0b1929';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.color='#64748b';}}>
              {q}
            </button>
          ))}
        </div>

        {/* Answer */}
        {aiLoading && (
          <div style={{ borderTop:'1px solid #f1f5f9', paddingTop:14, display:'flex', flexDirection:'column', gap:7 }}>
            {[100,82,65].map((w,i)=>(
              <div key={i} style={{ height:13, width:w+'%', background:'linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%)',
                backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite', borderRadius:4 }}/>
            ))}
          </div>
        )}
        {aiAnswer && (
          <div style={{ borderTop:'1px solid #f1f5f9', paddingTop:14 }}>
            <div style={{ fontSize:14, color:'#334155', lineHeight:1.8, whiteSpace:'pre-line', fontWeight:300, marginBottom:12 }}>
              {aiAnswer}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>window.location.href='/contact.html'}
                style={{ padding:'6px 14px', borderRadius:6, background:'#0b1929', color:'#fff',
                  fontSize:11, fontWeight:600, border:'none', cursor:'pointer', fontFamily:'DM Sans,sans-serif' }}>
                Book advisory session →
              </button>
              <button onClick={()=>{setAiAnswer(null);setAiInput('');}}
                style={{ padding:'6px 14px', borderRadius:6, background:'transparent', color:'#64748b',
                  fontSize:11, fontWeight:500, border:'1px solid #e2e8f0', cursor:'pointer', fontFamily:'DM Sans,sans-serif' }}>
                Clear
              </button>
            </div>
          </div>
        )}
      </div>

      {/* ── WHAT-IF EXPLORER ── */}
      <div style={cardStyle}>
        <div style={labelStyle}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="1.8" strokeLinecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          What-If Explorer
        </div>

        {/* Tab switcher */}
        <div style={{ display:'inline-flex', background:'#f8fafc', borderRadius:8, padding:3, gap:2, marginBottom:18 }}>
          {[{id:'rate',label:`${rateRef} shift`},{id:'balance',label:'Balance'},{id:'entities',label:'Entities'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{ padding:'5px 13px', borderRadius:6, border:'none', cursor:'pointer',
                fontFamily:'DM Sans,sans-serif', fontSize:12, fontWeight:600,
                background:tab===t.id?'#fff':'transparent', color:tab===t.id?'#0f172a':'#64748b',
                boxShadow:tab===t.id?'0 1px 3px rgba(15,23,42,.08)':'none', transition:'all .13s' }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Slider */}
        <div style={{ marginBottom:18 }}>
          {tab==='rate' && (
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:6 }}>
                <span style={{ fontSize:12, color:'#64748b', minWidth:190 }}>{rateRef} shift from {rateBase}%</span>
                <input type="range" min="-200" max="200" step="10" value={rateShift}
                  onChange={e=>setRateShift(parseInt(e.target.value))} style={{ flex:1 }}/>
                <span style={{ fontFamily:'DM Mono,monospace', fontSize:13, fontWeight:700, minWidth:56, textAlign:'right',
                  color:rateShift===0?'#64748b':rateShift>0?'#059669':'#dc2626' }}>
                  {rateShift>=0?'+':''}{rateShift}bp
                </span>
              </div>
              <div style={{ fontSize:11, color:'#94a3b8' }}>
                Pool bank: <strong style={{color:'#334155'}}>{poolBankName}</strong> ·
                Pool credit: <strong style={{color:'#334155'}}>{(poolCredit*100).toFixed(2)}%</strong>
                {rateShift!==0 && <> → <strong style={{color:rateShift>0?'#059669':'#dc2626'}}>{((poolCredit+rateShift/10000)*100).toFixed(2)}%</strong></>}
              </div>
            </div>
          )}
          {tab==='balance' && (
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <span style={{ fontSize:12, color:'#64748b', minWidth:190 }}>Pool balance change</span>
              <input type="range" min="-50" max="50" step="5" value={balShift}
                onChange={e=>setBalShift(parseInt(e.target.value))} style={{ flex:1 }}/>
              <span style={{ fontFamily:'DM Mono,monospace', fontSize:13, fontWeight:700, minWidth:56, textAlign:'right',
                color:balShift===0?'#64748b':balShift>0?'#059669':'#dc2626' }}>
                {balShift>=0?'+':''}{balShift}%
              </span>
            </div>
          )}
          {tab==='entities' && (
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <span style={{ fontSize:12, color:'#64748b', minWidth:190 }}>Entities in pool</span>
              <input type="range" min="2" max="12" step="1" value={entCount}
                onChange={e=>setEntCount(parseInt(e.target.value))} style={{ flex:1 }}/>
              <span style={{ fontFamily:'DM Mono,monospace', fontSize:13, fontWeight:700, minWidth:56, textAlign:'right', color:'#0f172a' }}>
                {entCount}
              </span>
            </div>
          )}
        </div>

        {/* Results — inline, compact */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10 }}>
          {[
            { label:'Interest saving', from:'€'+base.interest+'k', to:'€'+wi.interest+'k', pos:wi.interest>=base.interest },
            { label:'Payback period',  from:base.payback.toFixed(1)+' mo', to:wi.pb<999?wi.pb.toFixed(1)+' mo':'N/A', pos:wi.pb<=base.payback },
            { label:'Above break-even',from:'€'+(base.interest-base.breakeven)+'k', to:wi.above>0?'€'+wi.above+'k':'Below', pos:wi.above>0 },
            { label:'Verdict',         from:'GO', to:wi.verdict, pos:wi.verdict==='GO' },
          ].map((m,i)=>(
            <div key={i} style={{ background:'#f8fafc', borderRadius:8, padding:'12px 14px', border:'1px solid #e2e8f0' }}>
              <div style={{ fontSize:9, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.8px', marginBottom:7 }}>{m.label}</div>
              <div style={{ fontSize:11, color:'#94a3b8', fontFamily:'DM Mono,monospace', textDecoration:'line-through', marginBottom:2 }}>{m.from}</div>
              <div style={{ fontSize:14, fontWeight:700, fontFamily:'DM Mono,monospace', color:m.pos?'#059669':'#dc2626' }}>{m.to}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── ZBA vs NOTIONAL ── */}
      <div style={cardStyle}>
        <div style={labelStyle}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="3" width="8" height="18" rx="1"/><rect x="13" y="3" width="8" height="18" rx="1"/></svg>
          Structure Comparison
          <span style={{ marginLeft:'auto', fontSize:10, fontWeight:500, color:'#059669',
            background:'#ecfdf5', padding:'2px 9px', borderRadius:20 }}>
            Calculated from your inputs
          </span>
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
          <thead>
            <tr>
              <th style={{ textAlign:'left', padding:'8px 0', fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.7px', borderBottom:'1px solid #f1f5f9' }}>Metric</th>
              <th style={{ textAlign:'right', padding:'8px 12px', fontSize:10, fontWeight:700, color:'#059669', textTransform:'uppercase', letterSpacing:'.7px', borderBottom:'1px solid #f1f5f9' }}>ZBA</th>
              <th style={{ textAlign:'right', padding:'8px 12px', fontSize:10, fontWeight:700, color:'#64748b', textTransform:'uppercase', letterSpacing:'.7px', borderBottom:'1px solid #f1f5f9' }}>Notional</th>
              <th style={{ textAlign:'right', padding:'8px 0', fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.7px', borderBottom:'1px solid #f1f5f9' }}>Win</th>
            </tr>
          </thead>
          <tbody>
            {[
              {m:'Interest saving p.a.',  zba:'€'+base.interest+'k',   not:'€'+notionalSave+'k',  zbaW:true },
              {m:'WHT exposure',          zba:'€0',                    not:'€'+whtExposure+'k',    zbaW:true },
              {m:'TP documentation',      zba:'Full',                  not:'Simplified',           zbaW:false},
              {m:'Non-EU jurisdictions',  zba:'Supported',             not:'Limited',              zbaW:true },
              {m:'Implementation',        zba:'12–16 wks',             not:'8–10 wks',             zbaW:false},
              {m:'Net annual benefit',    zba:'€'+zbaNet+'k',          not:'€'+notionalNet+'k',    zbaW:true, bold:true},
            ].map((r,i)=>(
              <tr key={i} style={{ borderBottom:'1px solid #f8fafc' }}
                onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{ padding:'9px 0', color:'#475569', fontWeight:r.bold?600:400 }}>{r.m}</td>
                <td style={{ padding:'9px 12px', textAlign:'right', fontFamily:'DM Mono,monospace', fontWeight:r.zbaW?700:400, color:r.zbaW?'#059669':'#94a3b8' }}>{r.zba}</td>
                <td style={{ padding:'9px 12px', textAlign:'right', fontFamily:'DM Mono,monospace', fontWeight:!r.zbaW?700:400, color:!r.zbaW?'#059669':'#94a3b8' }}>{r.not}</td>
                <td style={{ padding:'9px 0', textAlign:'right', fontSize:11, fontWeight:600, color:r.zbaW?'#059669':'#475569' }}>{r.zbaW?'ZBA ✓':'Notional ✓'}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{ marginTop:14, padding:'12px 14px', background:'#f8fafc', borderRadius:8,
          fontSize:12, color:'#334155', lineHeight:1.6 }}>
          <strong>Recommendation:</strong> ZBA generates
          <strong style={{ color:'#059669' }}> €{Math.max(0,zbaNet-notionalNet)}k more annually</strong> than
          notional pooling for your structure, primarily through eliminated WHT exposure.
          Proceed with zero-balancing.
        </div>
      </div>

    </div>
  );
}

// ─── CTA fade-in after 45s or 2nd tab ─────────────────────────────────────
let _ctaShown = false;
let _tabCount = 0;
function trackTabForCTA(setCtaVisible) {
  _tabCount++;
  if (!_ctaShown && _tabCount >= 2) { _ctaShown = true; setCtaVisible(true); }
}
function loadSimData() {
  try {
    const raw = localStorage.getItem('cpm_sim');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

// ─── App root ─────────────────────────────────────────────────────────────

function App() {
  const [activeNav, setActiveNav] = useState('summary');
  const [ctaVisible, setCtaVisible] = useState(false);
  const sim = loadSimData();

  // CTA: show after 45s OR after 2nd tab click
  React.useEffect(() => {
    const t = setTimeout(() => { if(!_ctaShown){ _ctaShown=true; setCtaVisible(true); }}, 45000);
    return () => clearTimeout(t);
  }, []);

  function handleNav(id) {
    setActiveNav(id);
    trackTabForCTA(setCtaVisible);
  }

  // Override sample data with simulator input if available
  const groupName    = sim?.groupName    || 'Acme Manufacturing Group';
  const poolBank     = sim?.poolBank     || 'ING Bank';
  const totalEnt     = sim?.totalEntities|| 8;
  const totalAcc     = sim?.totalAccounts|| 12;
  const nettingEff   = sim?.nettingEff   || 73;
  const netBenefit   = sim?.netBenefit   || 842000;
  const interestSave = sim?.interestSaving|| 612000;
  const opSave       = sim?.opSaving     || 230000;
  const poolBalance  = sim?.poolBalance  || 12300000;
  const paybackMo    = sim?.paybackMo    || 8.4;
  const yieldSpread  = sim?.yieldSpread  || '1.20';
  const simEntities  = sim?.entities     || null;

  // Format helpers
  const fmtK = (n) => {
    const a = Math.abs(n);
    if (a >= 1000000) return (n<0?'−':''+'€') + (a/1000000).toFixed(2) + 'M';
    return (n<0?'−':'') + '€' + Math.round(a/1000) + 'k';
  };
  const fmtM = (n) => {
    const a = Math.abs(n);
    return (n>=0?'+':'−') + '€' + (a/1000000).toFixed(1) + 'M';
  };

  // Dynamic KPIs
  const dynKPIS = [
    { label:'Net Interest Savings', value:fmtK(interestSave),  badge:'↑ '+(sim?((interestSave/612000-1)*100).toFixed(0)+'%':'18.3%'), sub:'vs. standalone arrangement',  ring:null },
    { label:'Netting Efficiency',   value:nettingEff+'%',      badge:'↑ 12pp',  sub:'above sector benchmark', ring:nettingEff },
    { label:'Operational Savings',  value:fmtK(opSave),        badge:'Additional',sub:'FX, facility fees, accounts', ring:null },
    { label:'Avg. Yield Spread',    value:'+'+yieldSpread+'%', badge:'+'+(yieldSpread*100|0)+' bp', sub:'over pool benchmark rate', ring:null },
  ];

  // Dynamic entities for pool structure
  const dynEntities = simEntities ? simEntities.map(e => ({
    name: e.name,
    flag: ({DE:'🇩🇪',FR:'🇫🇷',GB:'🇬🇧',NL:'🇳🇱',CH:'🇨🇭',AT:'🇦🇹',CZ:'🇨🇿',SK:'🇸🇰',PL:'🇵🇱',HU:'🇭🇺',US:'🇺🇸',BE:'🇧🇪',SE:'🇸🇪',IT:'🇮🇹',ES:'🇪🇸'})[e.country] || '🏢',
    domicile: e.country,
    cc: e.cc,
    balance: (e.balance>=0?'+':'') + (e.cc==='EUR'?'€':'') + (Math.abs(e.balance)>=1e6?(Math.abs(e.balance)/1e6).toFixed(2)+'M':Math.round(Math.abs(e.balance)/1000)+'k'),
    surplus: e.balance >= 0,
    sweep: '18:00 CET',
    resident: ['DE','FR','NL','AT','BE','IT','ES','CZ','SK','PL','HU'].includes(e.country),
    interestRate: e.balance>=0?((sim?.poolCredit||0.04)*100).toFixed(2)+'%':((sim?.poolDebit||0.032)*100).toFixed(2)+'%',
    annual: (e.balance>=0?'+':'−')+'€'+Math.round(Math.abs(e.balance)*(e.balance>=0?(sim?.poolCredit||0.04):(sim?.poolDebit||0.032))/1000)+'k',
  })) : ENTITIES;

  const dynPoolBalance = poolBalance;

  return (
    <div style={{ display:'flex', width:'100%', minHeight:'100vh', background:'#f8fafc' }}>
      <Sidebar active={activeNav} onNav={handleNav} groupName={groupName} totalEnt={totalEnt} ctaVisible={ctaVisible} />
      <MainContent active={activeNav} groupName={groupName} totalEnt={totalEnt} totalAcc={totalAcc}
        nettingEff={nettingEff} netBenefit={netBenefit} interestSave={interestSave}
        opSave={opSave} poolBalance={dynPoolBalance} paybackMo={paybackMo}
        yieldSpread={yieldSpread} dynKPIS={dynKPIS} dynEntities={dynEntities}
        poolBank={poolBank} fmtK={fmtK} fmtM={fmtM} sim={sim}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
